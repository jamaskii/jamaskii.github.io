<html>
    <head>
        <title>文本加密</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=2.0, user-scalable=0" />
        <script src="main.js"></script>
        <link rel="stylesheet" href="style.css"></link>
    </head>
    <body>
        <div id="container" class="container">
            <h1>文本加密 - 社会主义核心价值观</h1>
            <textarea id="text_raw" class="textbox" onfocus="clearContent(this)">这里输入要加密的内容</textarea>
            </br>
            <button id="btn_en" class="btn" onclick="en()">加密</button>
            <button id="btn_de" class="btn" onclick="de()">解密</button>
            </br>
            <textarea id="text_encrypted" class="textbox" onfocus="clearContent(this)">这里输入要解密的内容</textarea>
        </div>
    </body>
</html>
