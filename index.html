<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>网易云音乐歌单解析</title>
<script>

function dp(str)
{
	document.getElementById("dp").innerHTML=str;
}

function settext(id,text)
{
	document.getElementById(id).innerHTML=text;
}

function prase(){
	var sid = document.getElementById("songid").value;
	if(sid!='')
	{
		var url='https://api.imjad.cn/cloudmusic/?type=playlist&id='+sid;
		dp('加载中...');
		$.get(url,function(data){
			switch (data["code"])
			{
				case 200:
					dp("匹配到歌单")
					settext("name","歌单名："+data["playlist"]["name"]);
					settext("count","\n歌曲数量："+data["playlist"]["tracks"].length);
					break;
				case 404:
					dp("未找到该歌单！");
					settext("name","歌单名：");
					settext("count","\n歌曲数量：");
					break;
			}
		});
	}
	else
	{
		dp('ID不能为空');	
	}
	
}

</script>
<script src="jquery.js" ></script>
</head>
<body>

<h1>网易云音乐歌单解析</h1>
<input id="songid" type="text" value="3067064154" style="height:20px;width:100px;" />
<button type="button" onclick="prase()">解析</button>
<p id="dp">就绪</p>
<p id="name">歌单名：</p>
<p id="count">歌曲数：</p>

</body>
</html>
