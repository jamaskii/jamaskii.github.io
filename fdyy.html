<html>
    <head>
        <title>飞登云印文档下载</title>
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"/>

        <style>
            .title{
                text-align: center;
                background-color: #619ac3;
            }

            .sub-title{
                text-align: center;
            }

            .item{
                margin-top: 3;
                text-align: center;
                background-color: #8fb2c9;
                padding: 2;
                width: auto;
            }

            .non-color-item{
                margin-top: 3;
                text-align: center;
                padding: 2;
                width: auto;
            }

            .item-title{
                margin-bottom: 2;
                margin-top: 2;
            }

            .table{
                margin-left: auto;
                margin-right: auto;
            }

            .submit{
                padding: 2;
                background-color: #619ac3;
                margin-top: 5;
                margin-left: auto;
                margin-right: auto;
            }

        </style>

        <!--禁止ios10以上设备缩放页面-->
        <script>
            window.onload = function()
            {
                // 阻止双击放大
                var lastTouchEnd = 0;
                document.addEventListener('touchstart', function(event) {
                    if (event.touches.length > 1) {
                        event.preventDefault();
                    }
                });
                document.addEventListener('touchend', function(event) {
                    var now = (new Date()).getTime();
                    if (now - lastTouchEnd <= 300) {
                        event.preventDefault();
                    }
                    lastTouchEnd = now;
                }, false);

                // 阻止双指放大
                document.addEventListener('gesturestart', function(event) {
                    event.preventDefault();
                });
            }
        </script>

        <script>
            function getStr(str, start, end)
            {
                let res = str.match(new RegExp(`${start}(.*?)${end}`))
                return res ? res[1] : null
            }
            function confirm(){
                var label=document.getElementById('label');
                var link=document.getElementById("link").value;
                if(link==""){
                    label.innerHTML="请输入分享链接";
                    return null;
                }

                var id=getStr(link,"FileShareId={{","}}")
                if(id==null){
                    label.innerHTML='链接格式不符，请检查';
                    return null;
                }
                try{
                    label.innerHTML='解析中...';
                    var httpRequest = new XMLHttpRequest();//第一步：建立所需的对象
                    httpRequest.open('GET', 'https://sc.fdvipyy.com/fd//index.php?c=dy&a=getFileRead&z=[FileId={{}}][FileShareId={{'+id+'}}]', true);//第二步：打开连接  将请求参数写在url中  ps:"./Ptest.php?name=test&nameone=testone"
                    httpRequest.send();
                    httpRequest.onreadystatechange = function () {
                        if (httpRequest.readyState == 4 && httpRequest.status == 200) {
                            //alert(httpRequest.responseText);
                            var jsonObject= JSON.parse(httpRequest.responseText);
                            label.innerHTML=jsonObject['FileShareObj']['FileName'];
                            label.setAttribute('href',jsonObject['FileShareObj']['PdfPath']);
                        }
                    };
                }catch(err){
                    alert("解析出错，请重试");
                }
            }
        </script>

    </head>
    <body>
        <h1 background-color="#619ac3" class="title">飞登云印文档下载</h1>
        <div class="non-color-item">
            <a class="sub-title" id="label">请输入文档分享链接</a>
        </div>
        <div class="item">
            <input id="link"></input>
            <button onclick="confirm()">确定</button>
        </div>
        
        
    </body>
</html>
